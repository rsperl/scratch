---
name: ci
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types:
      # Default PR events + ready_for_review
      # so checks run when PR is pulled out of draft
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - release-*

jobs:
  workflow-scratch:
    runs-on: ubuntu-latest
    # https://hub.docker.com/_/golang/
    container: golang:1.25.7
    permissions:
      contents: write
      id-token: write
    env:
      GOMEMLIMIT: 2GiB
    services:
      docker:
        image: docker:dind # Use the official Docker-in-Docker image
        options: --privileged --shm-size=2g # The --privileged flag is required for DinD to function
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load linter environment
        run: grep '^[A-Z]' ./.linter.env >> $GITHUB_ENV

      # See https://github.com/marketplace/actions/super-linter
      # Note: configuration is in ./.linter.env, loaded in previous step
      # TEST: multiple dockerfiles, dockerfiles in subdirectories
      # TEST: licenses
      - name: Linters
        uses: super-linter/super-linter/slim@v8.5.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Run unit tests with coverage
      - name: Unit tests
        run: |
          mkdir -p cov
          go test -count=1 -v -race -coverpkg=./lib ./lib/... -args -test.gocoverdir="$PWD/cov"
        continue-on-error: false

      - name: Generate coverage report
        run: |
          go tool covdata textfmt -i="$PWD/cov" -o=coverage.out

      # Display coverage summary
      - name: Display coverage summary
        run: |
          echo "========================================"
          echo "Coverage Summary"
          echo "========================================"
          go tool covdata percent -i="$PWD/cov"
          echo "========================================"

      - name: Check test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

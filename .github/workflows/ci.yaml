---
name: ci
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types:
      # Default PR events + ready_for_review
      # so checks run when PR is pulled out of draft
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - release-*

jobs:
  workflow-scratch:
    runs-on: ubuntu-latest
    # https://hub.docker.com/_/golang/
    permissions:
      contents: write
      id-token: write
    env:
      GOMEMLIMIT: 2GiB
    services:
      docker:
        image: docker:dind # Use the official Docker-in-Docker image
        options: --privileged --shm-size=2g # The --privileged flag is required for DinD to function

    steps:

      # https://github.com/actions/setup-go
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.7

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint go files
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --config=./.golangci-config.yaml
        continue-on-error: true

      - name: Lint dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./tests/integration/Dockerfile.a
        continue-on-error: true

      # https://github.com/joeig/go-licenses-action?tab=readme-ov-file
      # TODO: configure allowed/disallowed licenses, and test that it works
      - name: Lint license check
        uses: joeig/go-licenses-action@v1
        with:
          # For types, see https://github.com/google/licenseclassifier/blob/e6a9bb99b5a6f71d5a34336b8245e305f5430f99/license_type.go
          disallowed-types: 'forbidden,unknown'
        continue-on-error: true

      # https://github.com/marketplace/actions/shellcheck
      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true


      # Run unit tests with coverage
      - name: Unit tests
        run: |
          mkdir -p cov
          go test -count=1 -v -race -coverpkg=./lib ./lib/... -args -test.gocoverdir="$PWD/cov"
        continue-on-error: false

      - name: Generate coverage report
        run: |
          go tool covdata textfmt -i="$PWD/cov" -o=coverage.out

      # Display coverage summary
      - name: Display coverage summary
        run: |
          echo "========================================"
          echo "Coverage Summary"
          echo "========================================"
          go tool covdata percent -i="$PWD/cov"
          echo "========================================"

      # https://github.com/vladopajic/go-test-coverage/blob/main/README.md#configuration
      - name: Check test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

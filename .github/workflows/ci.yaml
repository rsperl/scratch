---
name: ci
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types:
      # Default PR events + ready_for_review
      # so checks run when PR is pulled out of draft
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - release-*
env:
  GO_VERSION: 1.25.7
  ARTIFACT_DIR: ./artifacts
  LINT_DIR: ./.github/linters
  COV_DIR: ./artifacts/cov

jobs:
  workflow-scratch:
    runs-on: ubuntu-latest
    # https://hub.docker.com/_/golang/
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    env:
      GOMEMLIMIT: 2GiB
      TRIVY_SKIP_DB_UPDATE: true
      TRIVY_SKIP_JAVA_DB_UPDATE: true

    services:
      docker:
        image: docker:dind # Use the official Docker-in-Docker image
        options: --privileged --shm-size=2g # The --privileged flag is required for DinD to function

    steps:

      # https://github.com/actions/setup-go
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR number using gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --search $(git rev-parse --short HEAD) --json number --jq '.[0] // {}.number')
          echo "pr_id=$PR_NUMBER" >> $GITHUB_ENV
          if [[ -n "$PR_NUMBER" ]]; then
            echo "PR number: $PR_NUMBER"
          else
            echo "No PR found for commit ${{ github.sha }}"
          fi

      - name: Create artifact directory
        run: mkdir -p ${{ env.ARTIFACT_DIR}}


      # https://golangci-lint.run/docs/welcome/install/ci/
      # https://github.com/golangci/golangci-lint-action
      - name: Lint go files
        id: lint-go-files
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          problem-matchers: true
          args: --config=${{ env.LINT_DIR }}/golangci-config.yaml
        continue-on-error: true


      # https://github.com/marketplace/actions/markdown-linting-action
      #
      - name: Lint markdown files
        id: lint-markdown
        uses: avto-dev/markdown-lint@v1
        env:
          INPUT_OUTPUT: ${{ env.ARTIFACT_DIR }}/markdown-lint-results.txt
        with:
          args: --output ${{ env.ARTIFACT_DIR }}/markdown-lint-results.txt ./
          config: ${{ env.LINT_DIR }}/markdown-lint.yml
        continue-on-error: true

      - name: Show markdown lint results
        if: steps.lint-markdown.outcome == 'failure'
        run: |-
          if [[ -f ${{ env.ARTIFACT_DIR }}/markdown-lint-results.txt ]]; then
            echo "Markdown linting issues found:"
            cat ${{ env.ARTIFACT_DIR }}/markdown-lint-results.txt
          else
            echo "Found linting issues but no results file was generated."
          fi

      # https://github.com/hadolint/hadolint-action
      # Note this has to be called multiple times for multiple dockerfiles
      - name: Lint dockerfile
        id: lint-dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./tests/integration/Dockerfile.a
          output-file: ${{ env.ARTIFACT_DIR }}/hadolint-Dockerfile.a.txt
          failure-threshold: error
          no-fail: true
        continue-on-error: true

      - name: Show hadolint results
        if: steps.lint-dockerfile.outcome == 'failure'
        run: cat ${{ env.ARTIFACT_DIR }}/hadolint-Dockerfile.a.txt


      # https://github.com/marketplace/actions/shellcheck
      - name: Lint shell scripts
        id: lint-shell
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true


      # https://github.com/gitleaks/gitleaks-action
      # Get free license key from https://gitleaks.io/
      - name: Check for secrets
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Only required for Organizations, not personal accounts.


      # https://github.com/aquasecurity/trivy-action
      # calling once here to populate the cache, and then skipping setup in the trivy-action step to save time
      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          cache: true
          version: v0.69.2

      - name: Check for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'table'
          output: ${{ env.ARTIFACT_DIR }}/trivy-vuln-results.txt
          skip-setup-trivy: true
          exit-code: 1
          trivy-config: ${{ env.LINT_DIR }}/trivy.yaml
        continue-on-error: true

      # License types https://github.com/google/licenseclassifier/blob/e6a9bb99b5a6f71d5a34336b8245e305f5430f99/license_type.go
      # https://trivy.dev/docs/latest/guide/scanner/license/
      # TODO: are these license categories sufficient
      - name: Check for vulnerabilities and license violations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: repo
          scanners: 'vuln,license'
          severity: 'CRITICAL,HIGH,UNKNOWN'
          ignore-unfixed: true
          format: 'table'
          output: ${{ env.ARTIFACT_DIR }}/trivy-license-results.txt
          skip-setup-trivy: true
          exit-code: 1
          trivy-config: ${{ env.LINT_DIR }}/trivy.yaml
        continue-on-error: true

      # https://github.com/golang/govulncheck-action
      # This is probably redundant with the trivy scan, but it will be nice to compare
      # the results
      - name: Run govulncheck
        run: |
          echo "PR: ${{ env.pr_id }}"
          go run golang.org/x/vuln/cmd/govulncheck@latest ./... 2>&1 | tee ${{ env.ARTIFACT_DIR }}/govulncheck-results.txt
        continue-on-error: true


      # Run unit tests with coverage
      - name: Unit tests
        run: |
          mkdir -p ${{ env.COV_DIR }}
          go test -count=1 -v -race -coverpkg=./lib ./lib/... -args -test.gocoverdir=${{ env.COV_DIR }} 2>&1 | \
            tee ${{ env.ARTIFACT_DIR }}/go-test-output.txt
        continue-on-error: false

      - name: Generate coverage report
        run: |
          go tool covdata textfmt -i=${{ env.COV_DIR }} -o=${{ env.ARTIFACT_DIR }}/coverage.out

      # Display coverage summary
      - name: Display coverage summary
        run: |
          go tool covdata percent -i=${{ env.COV_DIR }} 2>&1 | tee -a ${{ env.ARTIFACT_DIR }}/go-test-coverage-summary.txt


      # https://github.com/vladopajic/go-test-coverage/blob/main/docs/github_action.md
      # https://github.com/vladopajic/go-test-coverage/blob/main/README.md#configuration
      - name: Check test coverage
        id: check-coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ${{ env.LINT_DIR }}/testcoverage.yml
        continue-on-error: true

      - name: Post coverage report
        if: env.pr_id != ''
        uses: thollander/actions-comment-pull-request@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-tag: coverage-report
          pr-number: ${{ env.pr_id }}
          message: |
            go-test-coverage report:
            ```
            ${{ fromJSON(steps.coverage.outputs.report) }}```

      - name: "Evaluate coverage result"
        if: steps.coverage.outcome == 'failure'
        shell: bash
        run: echo "coverage check failed" && exit 1


      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ci-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: ${{ env.ARTIFACT_DIR }}/*

      - name: Check for failure
        if: ${{ failure() }}
        run: |
          echo "One or more steps failed. Check the workflow output and artifacts for details."
          exit 1
